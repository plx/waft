name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  check:
    name: Pre-release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2

      - name: just check-format
        run: just check-format

      - name: just check-clippy
        run: just check-clippy

      - name: just check-test
        run: just check-test

      - name: just check-doc-test
        run: just check-doc-test

      - name: just check-doc-build
        run: just check-doc-build

  # Placeholder for future cargo publish and binary builds
