name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: ${{ matrix.os }} / ${{ matrix.job }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        job: [fmt, clippy, test, doc-test]
        exclude:
          # Only run fmt once
          - os: macos-latest
            job: fmt
          - os: windows-latest
            job: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        if: matrix.job == 'fmt'
        run: cargo fmt --check

      - name: cargo clippy
        if: matrix.job == 'clippy'
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        if: matrix.job == 'test'
        run: cargo test --workspace --all-features

      - name: cargo test --doc
        if: matrix.job == 'doc-test'
        run: cargo test --doc
