name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2
      - name: just check-format
        run: just check-format

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2
      - name: just check-clippy
        run: just check-clippy

  doc-build:
    name: doc-build
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2
      - name: just check-doc-build
        run: just check-doc-build

  licenses:
    name: licenses
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-about
      - uses: Swatinem/rust-cache@v2
      - name: just check-licenses
        run: just check-licenses

  tests:
    name: ${{ matrix.os }} / tests
    runs-on: ${{ matrix.os }}
    needs: [fmt, clippy, doc-build, licenses]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2
      - name: just check-test
        run: just check-test
      - name: just check-doc-test
        run: just check-doc-test

  self-test:
    name: ${{ matrix.os }} / self-test
    runs-on: ${{ matrix.os }}
    needs: [fmt, clippy, doc-build, licenses]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2
      - name: just check-self-test
        run: just check-self-test
